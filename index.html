<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ระบบจดหวย Pro">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#4a90e2">
    
    <title>ระบบจดหวย Pro - Mobile App</title>
    
    <link rel="manifest" href="data:application/json,{%22name%22:%22ระบบจดหวย Pro%22,%22short_name%22:%22จดหวย%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22%23f0f4f8%22,%22theme_color%22:%22%234a90e2%22,%22icons%22:[{%22src%22:%22https://cdn-icons-png.flaticon.com/512/10043/10043831.png%22,%22sizes%22:%22512x512%22,%22type%22:%22image/png%22,%22purpose%22:%22any%20maskable%22}]}">

    <style>
        :root { --primary: #4a90e2; --success: #2ecc71; --danger: #e74c3c; --text: #2c3e50; --warning: #f39c12; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f0f4f8; margin: 0; padding: env(safe-area-inset-top) 10px 80px 10px; color: var(--text); -webkit-tap-highlight-color: transparent; }
        .container { max-width: 500px; margin: auto; }
        .card { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 12px; }
        h2 { font-size: 1rem; margin: 0 0 10px 0; color: var(--primary); border-bottom: 1px solid #eee; padding-bottom: 5px; }
        label { font-size: 0.75rem; color: #7f8c8d; }
        input, select { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #dcdde1; border-radius: 10px; font-size: 1rem; box-sizing: border-box; outline: none; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .grid-4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 5px; }
        .grid-1 { display: grid; grid-template-columns: 1fr; gap: 5px; }
        button { width: 100%; padding: 14px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.98); }
        .btn-add { background-color: var(--primary); color: white; margin-top: 5px; }
        .btn-archive { background-color: var(--success); color: white; margin-top: 8px; }
        .btn-line { background-color: #00c300; color: white; font-size: 0.85rem; }
        .btn-pdf { background-color: #6c757d; color: white; font-size: 0.85rem; }
        .btn-check { background-color: var(--primary); color: white; margin-top: 10px; }
        .btn-del { background: #fff1f0; color: var(--danger); border: 1px solid #ffa39e; padding: 4px 10px; width: auto; font-size: 0.75rem; }
        .total-summary { background: #e8f5e9; color: #2e7d32; padding: 12px; border-radius: 10px; text-align: right; font-size: 1rem; margin-top: 10px; font-weight: bold; }
        .win-summary { background: #fff1f0; color: #c62828; padding: 12px; border-radius: 10px; text-align: right; font-size: 1rem; margin-top: 5px; font-weight: bold; border: 1px solid #ffa39e; }
        .net-summary { background: #fee2e2; color: #dc2626; padding: 12px; border-radius: 10px; text-align: right; font-size: 1rem; margin-top: 5px; font-weight: bold; border: 1px solid #ef4444; }
        .category-group { margin-top: 10px; border-top: 1px solid #eee; padding-top: 8px; }
        .category-title { background: var(--primary); color: white; padding: 3px 10px; border-radius: 6px; font-size: 0.75rem; display: inline-block; margin-bottom: 5px; }
        .bet-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f0f0f0; }
        .check-section { background: #e3f2fd; border: 1px solid #bbdefb; }
        .result-area { background: #ffffff; padding: 15px; border-radius: 12px; margin-top: 10px; display: none; border: 2px solid #2ecc71; }
        .win-row { background: #f0fff4; border-left: 5px solid #2ecc71; padding: 12px; margin-bottom: 10px; border-radius: 10px; font-size: 0.85rem; cursor: pointer; }
        .win-detail { color: #27ae60; font-size: 0.8rem; margin-top: 4px; display: block; border-top: 1px dashed #ddd; padding-top: 4px; }
        .history-list { max-height: 250px; overflow-y: auto; }
        .history-item { font-size: 0.9rem; padding: 12px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .highlight { color: var(--primary); font-weight: bold; }
        .editing-mode { border: 2px solid var(--success) !important; background: #f6ffed !important; }
        .hidden-input { display: none; }
        .input-locked { background-color: #f8fafc !important; color: #64748b !important; }
        
        .master-table { width: 100%; border-collapse: collapse; font-size: 0.75rem; margin-top: 10px; }
        .master-table th, .master-table td { border: 1px solid #ddd; padding: 6px 4px; text-align: center; }
        .master-table th { background: #f8f9fa; color: var(--primary); }
        .row-total { background: #e3f2fd; font-weight: bold; }
        .row-eject { color: var(--danger); }

        @media print {
            body { background: white; padding: 0; color: black; }
            .card:not(#current-bill-card), .check-section, .btn-line, .btn-pdf, .btn-del, #input-section { display: none !important; }
            #current-bill-card { display: block !important; box-shadow: none; border: 1px solid #000; padding: 20px; }
            .bet-item[style*="background-color: rgb(255, 241, 240)"] { background-color: #f0f0f0 !important; border: 1px solid #000 !important; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2 onclick="document.getElementById('priceSettings').style.display = document.getElementById('priceSettings').style.display === 'none' ? 'block' : 'none'" style="cursor:pointer;">⚙️ ตั้งค่าราคาจ่าย & เลขอั้น (แตะ)</h2>
        <div id="priceSettings" style="display:none;">
            <div class="grid-2">
                <div><label>2 ตัว (บาทละ)</label><input type="number" id="r2" value="65"></div>
                <div><label>3 ตรง (บาทละ)</label><input type="number" id="r3_d" value="500"></div>
            </div>
            <div class="grid-2">
                <div><label>3 โต๊ด (บาทละ)</label><input type="number" id="r3_t" value="100"></div>
                <div><label>3 ล่าง (บาทละ)</label><input type="number" id="r3_low" value="100"></div>
            </div>
            <div class="grid-2">
                <div><label>วิ่งบน (บาทละ)</label><input type="number" id="r_run_up" value="3"></div>
                <div><label>วิ่งล่าง (บาทละ)</label><input type="number" id="r_run_down" value="3"></div>
            </div>
            <hr>
            <label>📌 ตั้งค่าเลขอั้น </label>
            <div class="grid-2">
                <input type="text" id="limitNum" placeholder="เลข" maxlength="3">
                <input type="number" id="limitAmt" placeholder="รับสูงสุด (บาท)">
            </div>
            <button onclick="addLimit()" style="background:var(--warning); color:white; margin-bottom: 10px;">เพิ่มเลขอั้น</button>
            <div id="limitList" style="font-size: 0.7rem; color: #666; margin-bottom: 10px;"></div>
            <button onclick="saveRates()" style="background:var(--primary); color:white; padding:10px;">บันทึกทั้งหมด</button>
        </div>
    </div>

    <div id="input-section" class="card">
        <h2 id="input-title">✍️ บันทึกรายการ</h2>
        <div class="grid-2">
            <div><label>ชื่อลูกค้า</label><input type="text" id="custName" placeholder="ระบุชื่อลูกค้า"></div>
            <div>
                <label>ประเภท</label>
                <select id="betType" onchange="updateUIByBetType()">
                    <option value="3ตัวบน">3 ตัวบน</option><option value="3ตัวล่าง">3 ตัวล่าง</option>
                    <option value="2ตัว">2 ตัว</option><option value="วิ่ง">วิ่ง</option>
                </select>
            </div>
        </div>
        <div class="grid-4">
            <div><label>เลข</label><input type="text" id="betNum" inputmode="numeric" maxlength="3"></div>
            <div id="boxDirect"><label id="lblDirect">ตรง</label><input type="number" id="betAmtDirect" inputmode="numeric"></div>
            <div id="boxToad"><label id="lblToad">โต๊ด</label><input type="number" id="betAmtToad" inputmode="numeric"></div>
            <div id="boxLow"><label id="lblLow">ล่าง</label><input type="number" id="betAmtLow" inputmode="numeric"></div>
        </div>
        <button class="btn-add" onclick="addBet()">➕ เพิ่มเลขลงบิล</button>
        <button id="btn-save-bill" class="btn-archive" onclick="archiveBill()">✅ บันทึกบิลลงเครื่อง</button>
        <button id="btn-cancel-edit" style="display:none; background:#ccc; margin-top:5px;" onclick="cancelEdit()">ยกเลิกการแก้ไข</button>
    </div>

    <div class="card" id="master-summary-card">
        <h2>📊 ตารางสรุปยอดรวม (ทุกบิล)</h2>
        <div style="overflow-x: auto;">
            <table class="master-table" id="masterTable">
                <thead>
                    <tr>
                        <th>ประเภท</th>
                        <th>เลข</th>
                        <th>ซื้อมา</th>
                        <th>รับจริง</th>
                        <th>ดีดออก</th>
                    </tr>
                </thead>
                <tbody id="masterBody"></tbody>
            </table>
        </div>
        <button class="btn-line" onclick="sendEjectedToLine()" style="margin-top: 10px; background: #e67e22;">🟠 ส่ง LINE ยอดดีดออก</button>
    </div>

    <div class="card" id="current-bill-card">
        <h2>📋 บิล: <span id="displayCustName" class="highlight">-</span></h2>
        <div id="betDisplayList"></div>
        <div class="total-summary" id="totalSales">ยอดรวม: 0 บาท</div>
        <div id="winCalculationArea" style="display:none;">
            <div class="win-summary" id="winAmount">ยอดถูกรางวัล: 0 บาท</div>
            <div class="net-summary" id="netAmount">ยอดจ่ายสุทธิ: 0 บาท</div>
        </div>
        <div class="grid-2" style="margin-top:20px;">
            <button class="btn-line" onclick="sendToLine()">🟢 ส่ง LINE</button>
            <button class="btn-pdf" onclick="window.print()">📄 พิมพ์/PDF</button>
        </div>
    </div>

    <div class="card" style="background: #fffbe6;">
        <h2>📁 ประวัติบิล</h2>
        <div id="billHistory" class="history-list"></div>
    </div>

    <div class="card check-section">
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; margin-bottom: 10px; padding-bottom: 5px;">
            <h2 style="border:none; margin:0;">🎯 ตรวจรางวัล</h2>
            <button id="btnEditWin" onclick="toggleWinEdit()" style="width: auto; padding: 4px 12px; font-size: 0.75rem; background: #6c757d; color: white;">แก้ไขผลรางวัล</button>
        </div>
        <div id="winInputContainer">
            <div class="grid-2">
                <div><label>2 ตัวบน</label><input type="text" id="win2up" maxlength="2" class="win-val" oninput="saveWinResult()"></div>
                <div><label>2 ตัวล่าง</label><input type="text" id="win2down" maxlength="2" class="win-val" oninput="saveWinResult()"></div>
            </div>
            <div class="grid-1"><label>3 ตัวบน</label><input type="text" id="win3up" maxlength="3" class="win-val" oninput="saveWinResult()"></div>
            <label>3 ตัวล่าง (4 รางวัล)</label>
            <div class="grid-4">
                <input type="text" id="win3d1" maxlength="3" class="win-val" oninput="saveWinResult()"><input type="text" id="win3d2" maxlength="3" class="win-val" oninput="saveWinResult()">
                <input type="text" id="win3d3" maxlength="3" class="win-val" oninput="saveWinResult()"><input type="text" id="win3d4" maxlength="3" class="win-val" oninput="saveWinResult()">
            </div>
        </div>
        <button class="btn-check" onclick="checkAllBills()">🔍 ตรวจรางวัลทุกบิล</button>
        <div id="resultOutput" class="result-area"></div>
        <button onclick="clearSystem()" style="background:none; color:#999; font-size:0.7rem; margin-top:20px; width:100%;">❌ ล้างข้อมูลทั้งหมด</button>
    </div>
</div>

<script>
    // Service Worker สำหรับ PWA
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            const swCode = "self.addEventListener('fetch', e => { e.respondWith(fetch(e.request).catch(() => caches.match(e.request))); });";
            const blob = new Blob([swCode], { type: 'application/javascript' });
            const swUrl = URL.createObjectURL(blob);
            navigator.serviceWorker.register(swUrl).catch(err => console.log('SW error', err));
        });
    }

    let currentBets = [];
    let billHistory = JSON.parse(localStorage.getItem('lot_history_v12')) || [];
    let rates = JSON.parse(localStorage.getItem('lot_rates')) || { r2: 65, r3d: 500, r3t: 100, r3low: 100, runUp: 3, runDown: 3 };
    let limits = JSON.parse(localStorage.getItem('lot_limits')) || {};
    let editingBillId = null;
    let isWinLocked = true;

    function addLimit() {
        const n = document.getElementById('limitNum').value;
        const a = parseFloat(document.getElementById('limitAmt').value);
        if(n && a >= 0) { limits[n] = a; renderLimitList(); }
        document.getElementById('limitNum').value = ''; document.getElementById('limitAmt').value = '';
    }

    function renderLimitList() {
        const div = document.getElementById('limitList');
        div.innerHTML = 'เลขอั้นปัจจุบัน: ' + Object.entries(limits).map(([n, a]) => `${n}=${a}บ.`).join(', ');
    }

    function saveRates() {
        rates = {
            r2: parseFloat(document.getElementById('r2').value),
            r3d: parseFloat(document.getElementById('r3_d').value),
            r3t: parseFloat(document.getElementById('r3_t').value),
            r3low: parseFloat(document.getElementById('r3_low').value),
            runUp: parseFloat(document.getElementById('r_run_up').value),
            runDown: parseFloat(document.getElementById('r_run_down').value)
        };
        localStorage.setItem('lot_rates', JSON.stringify(rates));
        localStorage.setItem('lot_limits', JSON.stringify(limits));
        alert("บันทึกราคาและเลขอั้นแล้ว");
        renderCurrentList();
    }

    function saveWinResult() {
        const winData = {
            w2u: document.getElementById('win2up').value,
            w2d: document.getElementById('win2down').value,
            w3u: document.getElementById('win3up').value,
            w3d: [document.getElementById('win3d1').value, document.getElementById('win3d2').value, document.getElementById('win3d3').value, document.getElementById('win3d4').value]
        };
        localStorage.setItem('lot_win_results', JSON.stringify(winData));
        renderCurrentList(); 
    }

    function loadWinResult() {
        const saved = JSON.parse(localStorage.getItem('lot_win_results'));
        if (saved) {
            document.getElementById('win2up').value = saved.w2u || "";
            document.getElementById('win2down').value = saved.w2d || "";
            document.getElementById('win3up').value = saved.w3u || "";
            if (saved.w3d) for(let i=0; i<4; i++) document.getElementById('win3d'+(i+1)).value = saved.w3d[i] || "";
        }
        lockWinFields(true);
    }

    function toggleWinEdit() {
        isWinLocked = !isWinLocked;
        lockWinFields(isWinLocked);
        const btn = document.getElementById('btnEditWin');
        btn.innerText = isWinLocked ? "แก้ไขผลรางวัล" : "✅ บันทึกรางวัล";
        btn.style.background = isWinLocked ? "#6c757d" : "#2ecc71";
        if (isWinLocked) saveWinResult();
    }

    function lockWinFields(lock) {
        document.querySelectorAll('.win-val').forEach(input => {
            input.readOnly = lock;
            lock ? input.classList.add('input-locked') : input.classList.remove('input-locked');
        });
    }

    function updateUIByBetType() {
        const type = document.getElementById('betType').value;
        const betInput = document.getElementById('betNum');
        const boxToad = document.getElementById('boxToad');
        const boxLow = document.getElementById('boxLow');
        betInput.value = ""; 
        boxToad.classList.remove('hidden-input'); boxLow.classList.add('hidden-input');
        if (type === '3ตัวบน') { betInput.setAttribute('maxlength', 3); document.getElementById('lblDirect').innerText = "ตรง"; boxLow.classList.remove('hidden-input'); }
        else if (type === '3ตัวล่าง') { betInput.setAttribute('maxlength', 3); boxToad.classList.add('hidden-input'); }
        else if (type === '2ตัว' || type === 'วิ่ง') { betInput.setAttribute('maxlength', type === '2ตัว' ? 2 : 1); document.getElementById('lblDirect').innerText = "บน"; document.getElementById('lblToad').innerText = "ล่าง"; }
    }

    function addBet() {
        const num = document.getElementById('betNum').value;
        const amtD = parseFloat(document.getElementById('betAmtDirect').value) || 0;
        const amtT = parseFloat(document.getElementById('betAmtToad').value) || 0;
        const amtL = parseFloat(document.getElementById('betAmtLow').value) || 0;
        const type = document.getElementById('betType').value;
        if(!num) return;
        if(amtD > 0) currentBets.push({ id: Date.now()+1, num, amt: amtD, type: (type === '2ตัว'?'2ตัวบน':(type === 'วิ่ง'?'วิ่งบน':type)), subType: (type.includes('3ตัว')?'ตรง':'บน') });
        if(amtT > 0 && type !== '3ตัวล่าง') currentBets.push({ id: Date.now()+2, num, amt: amtT, type: (type === '2ตัว'?'2ตัวล่าง':(type === 'วิ่ง'?'วิ่งล่าง':type)), subType: (type==='3ตัวบน'?'โต๊ด':'ล่าง') });
        if(amtL > 0 && type === '3ตัวบน') currentBets.push({ id: Date.now()+3, num, amt: amtL, type: '3ตัวล่าง', subType: 'ตรง' });
        renderCurrentList();
        document.getElementById('betNum').value = ''; document.getElementById('betAmtDirect').value = ''; document.getElementById('betAmtToad').value = ''; document.getElementById('betAmtLow').value = '';
        document.getElementById('betNum').focus();
    }

    function renderCurrentList() {
        const container = document.getElementById('betDisplayList');
        document.getElementById('displayCustName').innerText = document.getElementById('custName').value || "-";
        container.innerHTML = '';
        let total = 0; let totalWinInBill = 0;
        const w3u = document.getElementById('win3up').value;
        const w2u = document.getElementById('win2up').value;
        const w2d = document.getElementById('win2down').value;
        const w3d = [document.getElementById('win3d1').value, document.getElementById('win3d2').value, document.getElementById('win3d3').value, document.getElementById('win3d4').value];

        const groups = {};
        currentBets.forEach(b => {
            if (!groups[b.type]) groups[b.type] = [];
            groups[b.type].push(b); total += b.amt;
            
            let prize = 0;
            if (b.type === "3ตัวบน") {
                if (b.subType === 'ตรง' && b.num === w3u) prize = b.amt * rates.r3d;
                else if (b.subType === 'โต๊ด' && isToad(b.num, w3u)) prize = b.amt * rates.r3t;
            }
            if (b.type === "3ตัวล่าง" && w3d.includes(b.num)) prize = b.amt * rates.r3low;
            if (b.type === "2ตัวบน" && b.num === w2u) prize = b.amt * rates.r2;
            if (b.type === "2ตัวล่าง" && b.num === w2d) prize = b.amt * rates.r2;
            if (b.type === "วิ่งบน" && w2u.includes(b.num)) prize = b.amt * rates.runUp;
            if (b.type === "วิ่งล่าง" && w2d.includes(b.num)) prize = b.amt * rates.runDown;
            
            b.currentPrize = prize; 
            totalWinInBill += prize;
        });

        for (const type in groups) {
            let section = `<div class="category-group"><span class="category-title">${type}</span>`;
            groups[type].forEach((item) => {
                const winStyle = item.currentPrize > 0 ? 'background-color: #fff1f0; border: 1px solid #ffa39e;' : '';
                section += `<div class="bet-item" style="border-radius: 8px; padding: 6px 10px; margin-bottom:4px; ${winStyle}">
                    <span><b>${item.num}</b> <small>(${item.subType})</small></span>
                    <div><span>${item.amt.toLocaleString()} บ.</span> <button class="btn-del" onclick="deleteBet(${item.id})">ลบ</button></div>
                </div>`;
            });
            container.innerHTML += section + `</div>`;
        }
        document.getElementById('totalSales').innerText = `ยอดรวม: ${total.toLocaleString()} บาท`;
        if(totalWinInBill > 0) {
            document.getElementById('winCalculationArea').style.display = 'block';
            document.getElementById('winAmount').innerText = `ยอดถูกรางวัล: ${totalWinInBill.toLocaleString()} บาท`;
            document.getElementById('netAmount').innerText = `ยอดจ่ายสุทธิ: ${(totalWinInBill - total).toLocaleString()} บาท`;
        } else document.getElementById('winCalculationArea').style.display = 'none';
        
        renderMasterTable();
        renderHistoryList();
    }

    function renderMasterTable() {
        const body = document.getElementById('masterBody');
        body.innerHTML = '';
        
        let masterData = {};
        billHistory.forEach(bill => {
            bill.items.forEach(item => {
                let key = `${item.type}-${item.subType}-${item.num}`;
                if(!masterData[key]) masterData[key] = { ...item, totalAmt: 0 };
                masterData[key].totalAmt += item.amt;
            });
        });
        currentBets.forEach(item => {
            let key = `${item.type}-${item.subType}-${item.num}`;
            if(!masterData[key]) masterData[key] = { ...item, totalAmt: 0 };
            masterData[key].totalAmt += item.amt;
        });

        let sumBuy = 0, sumIn = 0, sumOut = 0;
        Object.values(masterData).forEach(d => {
            let limit = limits[d.num] !== undefined ? limits[d.num] : 9999999;
            let inAmt = Math.min(d.totalAmt, limit);
            let outAmt = d.totalAmt - inAmt;
            sumBuy += d.totalAmt; sumIn += inAmt; sumOut += outAmt;
            body.innerHTML += `<tr>
                <td>${d.type}/${d.subType}</td>
                <td><b>${d.num}</b></td>
                <td>${d.totalAmt.toLocaleString()}</td>
                <td>${inAmt.toLocaleString()}</td>
                <td class="row-eject">${outAmt > 0 ? outAmt.toLocaleString() : '-'}</td>
            </tr>`;
        });
        body.innerHTML += `<tr class="row-total">
            <td colspan="2">ยอดรวมทั้งหมด</td>
            <td>${sumBuy.toLocaleString()}</td>
            <td>${sumIn.toLocaleString()}</td>
            <td class="row-eject">${sumOut.toLocaleString()}</td>
        </tr>`;
    }

    function isToad(bet, win) {
        if (!win || bet.length !== 3 || bet === win) return false;
        return bet.split('').sort().join('') === win.split('').sort().join('');
    }

    function archiveBill() {
        const name = document.getElementById('custName').value;
        if(currentBets.length === 0 || !name) { alert("กรุณาใส่ชื่อลูกค้าและเลข"); return; }
        if (editingBillId) billHistory = billHistory.filter(b => b.id !== editingBillId);
        billHistory.push({ id: editingBillId || Date.now(), customer: name, items: [...currentBets], total: currentBets.reduce((a, b) => a + b.amt, 0) });
        localStorage.setItem('lot_history_v12', JSON.stringify(billHistory));
        alert("บันทึกลงเครื่องแล้ว"); resetInputState();
    }

    function checkAllBills() {
        const resultDiv = document.getElementById('resultOutput');
        resultDiv.style.display = 'block'; resultDiv.innerHTML = '<h3>ผลการตรวจรางวัล:</h3>';
        let found = false;
        billHistory.forEach((bill) => {
            let totalWin = 0; let detailTxt = '';
            bill.items.forEach(item => {
                let p = 0;
                if (item.type === "3ตัวบน") {
                    if (item.subType === 'ตรง' && item.num === document.getElementById('win3up').value) p = item.amt * rates.r3d;
                    else if (item.subType === 'โต๊ด' && isToad(item.num, document.getElementById('win3up').value)) p = item.amt * rates.r3t;
                }
                if (item.type === "3ตัวล่าง" && [document.getElementById('win3d1').value,document.getElementById('win3d2').value,document.getElementById('win3d3').value,document.getElementById('win3d4').value].includes(item.num)) p = item.amt * rates.r3low;
                if (item.type === "2ตัวบน" && item.num === document.getElementById('win2up').value) p = item.amt * rates.r2;
                if (item.type === "2ตัวล่าง" && item.num === document.getElementById('win2down').value) p = item.amt * rates.r2;
                if (item.type === "วิ่งบน" && document.getElementById('win2up').value.includes(item.num)) p = item.amt * rates.runUp;
                if (item.type === "วิ่งล่าง" && document.getElementById('win2down').value.includes(item.num)) p = item.amt * rates.runDown;
                if (p > 0) { totalWin += p; detailTxt += `• ${item.num} (${item.type}/${item.subType}) = ${p.toLocaleString()} บ.<br>`; }
            });
            if (totalWin > 0) {
                found = true;
                resultDiv.innerHTML += `<div class="win-row" onclick="viewBillById(${bill.id})">
                    <strong>👤 คุณ${bill.customer}</strong> <span style="color:var(--danger);float:right;font-weight:bold;">+${totalWin.toLocaleString()} บ.</span>
                    <span class="win-detail">${detailTxt}</span>
                </div>`;
            }
        });
        if (!found) resultDiv.innerHTML += '<p style="text-align:center;">ไม่พบผู้ถูกรางวัล</p>';
        renderCurrentList();
    }

    function renderHistoryList() {
        const histDiv = document.getElementById('billHistory');
        histDiv.innerHTML = billHistory.length === 0 ? '<div style="text-align:center;color:#ccc;">ไม่มีประวัติ</div>' : '';
        billHistory.sort((a,b) => b.id - a.id).forEach((bill) => { histDiv.innerHTML += `<div class="history-item" onclick="viewBillById(${bill.id})"><span>👤 ${bill.customer}</span><span class="highlight">${bill.total.toLocaleString()} บ.</span></div>`; });
    }

    function viewBillById(billId) {
        const bill = billHistory.find(b => b.id === billId); if (!bill) return;
        document.getElementById('custName').value = bill.customer;
        currentBets = JSON.parse(JSON.stringify(bill.items));
        editingBillId = bill.id;
        document.getElementById('input-title').innerText = "✏️ แก้ไขบิล: " + bill.customer;
        document.getElementById('input-section').classList.add('editing-mode');
        document.getElementById('btn-cancel-edit').style.display = 'block';
        document.getElementById('btn-save-bill').innerText = "💾 อัปเดตข้อมูลบิล";
        document.getElementById('master-summary-card').style.display = 'none';
        renderCurrentList();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function resetInputState() {
        currentBets = []; editingBillId = null;
        document.getElementById('custName').value = ''; document.getElementById('input-title').innerText = "✍️ บันทึกรายการ";
        document.getElementById('input-section').classList.remove('editing-mode');
        document.getElementById('btn-cancel-edit').style.display = 'none';
        document.getElementById('btn-save-bill').innerText = "✅ บันทึกบิลลงเครื่อง";
        document.getElementById('master-summary-card').style.display = 'block';
        renderCurrentList();
    }

    function deleteBet(id) { currentBets = currentBets.filter(b => b.id !== id); renderCurrentList(); }
    function cancelEdit() { resetInputState(); }

    function sendToLine() {
        const name = document.getElementById('custName').value || "ทั่วไป";
        let total = 0;
        let txt = `📝 บิล : ${name}\n`;
        currentBets.forEach(b => { 
            let typeName = b.type;
            if (b.type === '2ตัวบน') typeName = '2 ตัวบน';
            if (b.type === '2ตัวล่าง') typeName = '2 ตัวล่าง';
            txt += `🔹 ${b.num} (${typeName}/${b.subType}) = ${b.amt.toLocaleString()} บาท\n`; 
            total += b.amt;
        });
        txt += `\n💰 ยอดรวม = ${total.toLocaleString()} บาท`;
        window.location.href = "line://msg/text/" + encodeURIComponent(txt);
    }

    function sendEjectedToLine() {
        let masterData = {};
        [...billHistory.flatMap(b => b.items), ...currentBets].forEach(item => {
            let key = `${item.type}-${item.subType}-${item.num}`;
            if(!masterData[key]) masterData[key] = { ...item, totalAmt: 0 };
            masterData[key].totalAmt += item.amt;
        });
        let txt = `🟠 รายการส่งออก \n----------------\n`;
        let totalOut = 0;
        Object.values(masterData).forEach(d => {
            let limit = limits[d.num] !== undefined ? limits[d.num] : 9999999;
            let outAmt = d.totalAmt - limit;
            if(outAmt > 0) {
                txt += `❌ ${d.num} (${d.type}/${d.subType}) ส่ง: ${outAmt.toLocaleString()} บ.\n`;
                totalOut += outAmt;
            }
        });
        if(totalOut === 0) txt += "ไม่มีรายการส่งออก";
        else txt += `----------------\n🔥 รวมส่งทั้งหมด: ${totalOut.toLocaleString()} บาท`;
        window.location.href = "line://msg/text/" + encodeURIComponent(txt);
    }

    function clearSystem() { if(confirm("ล้างข้อมูลทั้งหมด?")) { localStorage.clear(); billHistory = []; resetInputState(); location.reload(); } }

    document.getElementById('r2').value = rates.r2; document.getElementById('r3_d').value = rates.r3d;
    document.getElementById('r3_t').value = rates.r3t; document.getElementById('r3_low').value = rates.r3low;
    document.getElementById('r_run_up').value = rates.runUp; document.getElementById('r_run_down').value = rates.runDown;
    renderLimitList(); loadWinResult(); renderHistoryList(); updateUIByBetType();
</script>
</body>
</html>
